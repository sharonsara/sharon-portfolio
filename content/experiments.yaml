# ============================================================
#  EXPERIMENTS — edit this file, never the code.
#  These show in the "Selected experiments" grid on the homepage.
#  To add one: copy a block below and fill in the fields.
#    tag        short category label (kept in English, e.g. AGENTS)
#    title      English headline
#    title_th   Thai headline (shown on the /th site)
#    takeaway   English one-paragraph takeaway
#    takeaway_th Thai takeaway
#    featured   true on ONE item only — it becomes the big dark card
#  Order here = order shown. The featured item is pulled to the top.
# ============================================================

experiments:
  - tag: AGENTS
    featured: true
    title: Building a 5-agent research crew with the Claude Agent SDK
    title_th: สร้างทีมวิจัย 5 เอเจนต์ด้วย Claude Agent SDK
    takeaway: >-
      Splitting one big prompt into specialised agents cut my error rate hard.
      Here's when orchestration actually beats a single model — and when it's
      just overhead.
    takeaway_th: >-
      การแยกพรอมต์ก้อนใหญ่ออกเป็นเอเจนต์เฉพาะทางช่วยลดอัตราความผิดพลาดได้เยอะมาก
      นี่คือจังหวะที่การจัดวางหลายเอเจนต์ชนะโมเดลเดี่ยวจริง ๆ
      และจังหวะที่มันเป็นแค่ภาระเกินจำเป็น

  - tag: COMPUTER USE
    title: I let a model drive my browser for a week
    title_th: ฉันให้โมเดลคุมเบราว์เซอร์แทนหนึ่งสัปดาห์เต็ม
    takeaway: >-
      Promising, not magic. It nailed repetitive forms and fell apart on
      anything ambiguous. A plain-English guide to where it helps today.
    takeaway_th: >-
      มีอนาคต แต่ยังไม่ใช่เวทมนตร์ มันทำฟอร์มซ้ำ ๆ ได้เป๊ะ
      แต่พังทันทีกับอะไรที่กำกวม นี่คือคู่มือภาษาง่าย ๆ ว่าวันนี้มันช่วยอะไรได้บ้าง

  - tag: VOICE
    title: Real-time voice agents that don't sound like robots
    title_th: เอเจนต์เสียงแบบเรียลไทม์ที่ไม่ฟังดูเหมือนหุ่นยนต์
    takeaway: >-
      Latency is the whole game. What I changed to get a back-and-forth that
      feels like a phone call, not a walkie-talkie.
    takeaway_th: >-
      ทุกอย่างอยู่ที่ความหน่วง นี่คือสิ่งที่ฉันปรับ
      เพื่อให้บทสนทนาโต้ตอบลื่นเหมือนคุยโทรศัพท์ ไม่ใช่วิทยุสื่อสาร

  - tag: RAG
    title: Why my first RAG setup lied with total confidence
    title_th: ทำไมระบบ RAG ตัวแรกของฉันถึงโกหกหน้าตาเฉย
    takeaway: >-
      Retrieval was fine — the prompt wasn't. The two fixes that stopped the
      hallucinations, explained without the jargon.
    takeaway_th: >-
      การดึงข้อมูลไม่มีปัญหา — ปัญหาอยู่ที่พรอมต์ นี่คือสองจุดที่แก้แล้วหยุดอาการมโนได้
      อธิบายแบบไม่มีศัพท์เทคนิค
